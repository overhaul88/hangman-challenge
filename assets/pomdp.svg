<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="100%" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="480" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs>
    <marker id="ah1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="440" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Hangman as a Partially Observed Markov Decision Process</text>

  <!-- Box A: Environment / hidden state -->
  <rect x="44" y="66" width="360" height="150" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="64" y="92" font-size="14" font-weight="700" fill="#92400e">ENVIRONMENT: hidden word (state s)</text>
  <g font-size="20" font-weight="700" fill="#7c2d12" text-anchor="middle">
    <rect x="64"  y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="85"  y="132">P</text>
    <rect x="112" y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="133" y="132">U</text>
    <rect x="160" y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="181" y="132">Z</text>
    <rect x="208" y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="229" y="132">Z</text>
    <rect x="256" y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="277" y="132">L</text>
    <rect x="304" y="104" width="42" height="42" rx="6" fill="#fff7ed" stroke="#d97706"/><text x="325" y="132">E</text>
  </g>
  <text x="64" y="176" font-size="13" fill="#7c2d12">lives = 6 wrong guesses allowed</text>
  <text x="64" y="198" font-size="12.5" fill="#a16207">the word is never shown to the agent</text>

  <!-- Box B: Observation -->
  <rect x="476" y="66" width="360" height="150" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="496" y="92" font-size="14" font-weight="700" fill="#1e40af">OBSERVATION o(t)</text>
  <g font-size="20" font-weight="700" fill="#1e3a8a" text-anchor="middle">
    <rect x="496" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#2563eb"/><text x="517" y="132">P</text>
    <rect x="544" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#93c5fd"/><text x="565" y="132" fill="#93c5fd">_</text>
    <rect x="592" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#93c5fd"/><text x="613" y="132" fill="#93c5fd">_</text>
    <rect x="640" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#93c5fd"/><text x="661" y="132" fill="#93c5fd">_</text>
    <rect x="688" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#93c5fd"/><text x="709" y="132" fill="#93c5fd">_</text>
    <rect x="736" y="104" width="42" height="42" rx="6" fill="#eff6ff" stroke="#2563eb"/><text x="757" y="132">E</text>
  </g>
  <text x="496" y="176" font-size="13" fill="#1e3a8a">guessed = { a, e, p }   ·   wrong = 1</text>
  <text x="496" y="198" font-size="12.5" fill="#3b82f6">o(t) = revealed pattern + the guessed-letter set</text>

  <!-- Box C: Agent belief -->
  <rect x="476" y="286" width="360" height="150" rx="10" fill="#d1fae5" stroke="#059669"/>
  <text x="496" y="312" font-size="14" font-weight="700" fill="#065f46">AGENT: belief b(t) over 26 letters</text>
  <text x="496" y="330" font-size="12.5" fill="#047857">posterior P(letter in word | pattern, absent-set)</text>
  <g fill="#10b981">
    <rect x="512" y="388" width="30" height="34" rx="3"/>
    <rect x="552" y="372" width="30" height="50" rx="3" fill="#059669"/>
    <rect x="592" y="398" width="30" height="24" rx="3"/>
    <rect x="632" y="404" width="30" height="18" rx="3"/>
    <rect x="672" y="410" width="30" height="12" rx="3"/>
    <rect x="712" y="414" width="30" height="8" rx="3"/>
  </g>
  <g font-size="12" fill="#065f46" text-anchor="middle">
    <text x="527" y="434">t</text><text x="567" y="434">l</text><text x="607" y="434">r</text>
    <text x="647" y="434">n</text><text x="687" y="434">s</text><text x="727" y="434">d</text>
  </g>

  <!-- Box D: Action -->
  <rect x="44" y="286" width="360" height="150" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="64" y="312" font-size="14" font-weight="700" fill="#92400e">ACTION a(t): guess one letter</text>
  <rect x="150" y="330" width="80" height="72" rx="8" fill="#fff7ed" stroke="#d97706"/>
  <text x="190" y="380" text-anchor="middle" font-size="40" font-weight="700" fill="#b45309">L</text>
  <text x="64" y="426" font-size="12.5" fill="#7c2d12">a(t) = argmax over unguessed letters of b(t)</text>

  <!-- Arrows clockwise -->
  <line x1="404" y1="141" x2="472" y2="141" stroke="#475569" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="438" y="132" text-anchor="middle" font-size="12" fill="#475569">observe</text>

  <line x1="656" y1="216" x2="656" y2="282" stroke="#475569" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="686" y="254" font-size="12" fill="#475569">infer</text>

  <line x1="476" y1="361" x2="408" y2="361" stroke="#475569" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="442" y="352" text-anchor="middle" font-size="12" fill="#475569">decide</text>

  <line x1="224" y1="286" x2="224" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="198" y="256" text-anchor="end" font-size="12" fill="#475569">act</text>
  <text x="238" y="250" font-size="11.5" fill="#94a3b8">reveal all matches,</text>
  <text x="238" y="266" font-size="11.5" fill="#94a3b8">else lose one life</text>
</svg>
