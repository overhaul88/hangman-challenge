<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="100%" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="420" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs>
    <marker id="ah2" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Negative evidence reshapes the posterior</text>
  <text x="440" y="56" text-anchor="middle" font-size="13" fill="#64748b">board pattern:  _ _ _ _ e     wrong guesses so far:  a, o, s</text>

  <!-- LEFT: without negative evidence -->
  <text x="230" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">P(letter | pattern) only</text>
  <line x1="70" y1="330" x2="390" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <g fill="#94a3b8">
    <rect x="82"  y="250" width="30" height="80" rx="3"/>
    <rect x="126" y="200" width="30" height="130" rx="3"/>
    <rect x="170" y="270" width="30" height="60" rx="3"/>
    <rect x="214" y="235" width="30" height="95" rx="3"/>
    <rect x="258" y="230" width="30" height="100" rx="3"/>
    <rect x="302" y="245" width="30" height="85" rx="3"/>
    <rect x="346" y="285" width="30" height="45" rx="3"/>
  </g>
  <g font-size="13" fill="#334155" text-anchor="middle">
    <text x="97" y="348">a</text><text x="141" y="348">i</text><text x="185" y="348">o</text>
    <text x="229" y="348">r</text><text x="273" y="348">n</text><text x="317" y="348">s</text><text x="361" y="348">t</text>
  </g>
  <text x="230" y="378" text-anchor="middle" font-size="12" fill="#64748b">a, o, s still carry probability mass</text>

  <!-- arrow -->
  <line x1="405" y1="240" x2="470" y2="240" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="437" y="228" text-anchor="middle" font-size="11.5" fill="#7c3aed">condition</text>
  <text x="437" y="258" text-anchor="middle" font-size="11.5" fill="#7c3aed">on absent</text>

  <!-- RIGHT: with negative evidence -->
  <text x="650" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">P(letter | pattern, absent = {a,o,s})</text>
  <line x1="490" y1="330" x2="810" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <g>
    <rect x="502" y="322" width="30" height="8"  rx="3" fill="#c4b5fd"/>
    <rect x="546" y="170" width="30" height="160" rx="3" fill="#7c3aed"/>
    <rect x="590" y="322" width="30" height="8"  rx="3" fill="#c4b5fd"/>
    <rect x="634" y="205" width="30" height="125" rx="3" fill="#7c3aed"/>
    <rect x="678" y="198" width="30" height="132" rx="3" fill="#7c3aed"/>
    <rect x="722" y="322" width="30" height="8"  rx="3" fill="#c4b5fd"/>
    <rect x="766" y="250" width="30" height="80" rx="3" fill="#7c3aed"/>
  </g>
  <g font-size="13" text-anchor="middle">
    <text x="517" y="348" fill="#c4b5fd">a</text><text x="561" y="348" fill="#334155">i</text><text x="605" y="348" fill="#c4b5fd">o</text>
    <text x="649" y="348" fill="#334155">r</text><text x="693" y="348" fill="#334155">n</text><text x="737" y="348" fill="#c4b5fd">s</text><text x="781" y="348" fill="#334155">t</text>
  </g>
  <text x="650" y="378" text-anchor="middle" font-size="12" fill="#6d28d9">a, o, s collapse to zero; mass moves to i, r, n</text>

  <text x="440" y="406" text-anchor="middle" font-size="12.5" fill="#475569">the encoder injects a 52-dim [ absent(26) | present(26) ] vector into every token, so the belief is a true posterior</text>
</svg>
