<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 636" width="100%" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect x="0" y="0" width="920" height="636" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs>
    <marker id="ah7" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="340" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Strategy 7: belief-unfreezing DRQN</text>

  <!-- input -->
  <rect x="200" y="50" width="280" height="46" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="340" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">board pattern + (absent, present)</text>

  <line x1="285" y1="96" x2="200" y2="118" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <line x1="395" y1="96" x2="480" y2="118" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>

  <!-- encoder with freeze map -->
  <rect x="60" y="120" width="260" height="150" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="190" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1e40af">v2 encoder (reused, 10.7M)</text>
  <g font-size="11.5">
    <rect x="72" y="152" width="236" height="24" rx="5" fill="#e2e8f0" stroke="#cbd5e1"/><text x="82" y="168" fill="#475569">emb &#183; pos &#183; state_proj</text><text x="298" y="168" text-anchor="end" fill="#64748b">frozen</text>
    <rect x="72" y="180" width="236" height="24" rx="5" fill="#e2e8f0" stroke="#cbd5e1"/><text x="82" y="196" fill="#475569">transformer layers 1 to 4</text><text x="298" y="196" text-anchor="end" fill="#64748b">frozen</text>
    <rect x="72" y="208" width="236" height="24" rx="5" fill="#bfdbfe" stroke="#2563eb"/><text x="82" y="224" fill="#1e3a8a">transformer layers 5 to 6</text><text x="298" y="224" text-anchor="end" fill="#1d4ed8" font-weight="700">trainable</text>
    <rect x="72" y="236" width="236" height="24" rx="5" fill="#bfdbfe" stroke="#2563eb"/><text x="82" y="252" fill="#1e3a8a">output head</text><text x="298" y="252" text-anchor="end" fill="#1d4ed8" font-weight="700">trainable</text>
  </g>

  <!-- MoE oracle -->
  <rect x="360" y="120" width="260" height="150" rx="10" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="490" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#374151">v2 MoE oracle</text>
  <text x="490" y="168" text-anchor="middle" font-size="12" fill="#4b5563">5 BiLSTM experts + gating net</text>
  <text x="490" y="188" text-anchor="middle" font-size="12" fill="#4b5563">gated blend &#8594; p_moe</text>
  <rect x="392" y="210" width="196" height="34" rx="8" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="490" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">all frozen · no gradient</text>

  <!-- beliefs -->
  <line x1="190" y1="270" x2="190" y2="288" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <line x1="490" y1="270" x2="490" y2="288" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <rect x="120" y="290" width="140" height="38" rx="9" fill="#2563eb"/>
  <text x="190" y="314" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">p_enc  (grad)</text>
  <rect x="420" y="290" width="140" height="38" rx="9" fill="#6b7280"/>
  <text x="490" y="314" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">p_moe  (frozen)</text>

  <!-- concat -->
  <line x1="190" y1="328" x2="250" y2="344" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <line x1="490" y1="328" x2="430" y2="344" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <rect x="110" y="346" width="460" height="44" rx="9" fill="#d1fae5" stroke="#059669"/>
  <text x="340" y="373" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065f46">x(t) = [ p_enc | p_moe | guessed | wrong/6 | t/11 ]  =  80</text>

  <!-- GRU -->
  <line x1="340" y1="390" x2="340" y2="404" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <rect x="230" y="406" width="220" height="40" rx="9" fill="#fef3c7" stroke="#d97706"/>
  <text x="340" y="431" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">GRU(256), stateful across the game</text>

  <line x1="340" y1="446" x2="340" y2="458" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <rect x="230" y="460" width="220" height="40" rx="9" fill="#fef3c7" stroke="#d97706"/>
  <text x="340" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">FC 256 &#8594; 128 &#8594; 26  Q-values</text>

  <line x1="340" y1="500" x2="340" y2="512" stroke="#64748b" stroke-width="1.6" marker-end="url(#ah7)"/>
  <rect x="205" y="514" width="270" height="38" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="340" y="538" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">mask guessed &#8594; argmax &#8594; letter</text>

  <!-- training sidebar -->
  <rect x="640" y="120" width="248" height="380" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="764" y="144" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">training loop</text>
  <line x1="656" y1="154" x2="872" y2="154" stroke="#e2e8f0"/>
  <g font-size="12" fill="#475569">
    <text x="656" y="178">Double-DQN, target EMA &#964;=0.005</text>
    <text x="656" y="202">prioritised replay (&#945;=0.6, IS wts)</text>
    <text x="656" y="226">dense per-step reward shaping</text>
    <text x="656" y="250">aux MLM loss: L = L_DQN + 0.1&#183;L_MLM</text>
    <text x="656" y="274">encoder warm-up: 100k episodes</text>
    <text x="656" y="298">lr: DRQN 3e-4 · encoder 1e-5</text>
    <text x="656" y="322">grad clip: enc 0.5 · DRQN 1.0</text>
  </g>
  <text x="656" y="356" font-size="12.5" font-weight="700" fill="#5b21b6">pseudo-OOV curriculum</text>
  <g font-size="12" fill="#6d28d9">
    <text x="656" y="378">hold out -tion, -ness suffix clusters</text>
    <text x="656" y="400">80% in-vocab / 20% pseudo-OOV</text>
    <text x="656" y="422">select checkpoints on pseudo-OOV wr</text>
  </g>
  <text x="656" y="456" font-size="12.5" font-weight="700" fill="#334155">safety gate</text>
  <text x="656" y="478" font-size="12" fill="#475569">ship only if it beats v2 on real OOV</text>

  <!-- result -->
  <rect x="60" y="568" width="828" height="48" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="474" y="590" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Result on held-out OOV:  DRQN 0.568   ·   belief fine-tune 0.630   ·   both below v2 0.635</text>
  <text x="474" y="608" text-anchor="middle" font-size="12" fill="#7f1d1d">the no-regression gate ships strategy 2; RL-moving the belief did not clear the OOV ceiling</text>
</svg>
